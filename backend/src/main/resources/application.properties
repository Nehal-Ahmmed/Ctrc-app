# server port, must match what the flutter app expects
server.port=8089

# datasource config, update username/password for your local mysql
spring.datasource.url=jdbc:mysql://localhost:3306/ctrc_db
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# jdbc connection pool basics
spring.datasource.hikari.maximum-pool-size=10

# show sql params in logs while developing, turn off later
logging.level.org.springframework.jdbc.core=debug
