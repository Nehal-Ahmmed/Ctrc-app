# Application Name
spring.application.name=ctrcbackend

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8089
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================
# DATABASE CONFIGURATION - MySQL
# ==========================================

# MySQL Database Connection
# URL Format: jdbc:mysql://host:port/database_name
# host: localhost (or IP address of your MySQL server)
# port: 3306 (default MySQL port)
# database_name: ctrc_db (change to your database name)
spring.datasource.url=jdbc:mysql://localhost:3306/ctrcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database username
spring.datasource.username=root

# Database password
# IMPORTANT: Change this to your actual MySQL root password
spring.datasource.password=nehal@1458112

# Database driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONNECTION POOL CONFIGURATION (HikariCP)
# ==========================================

# Connection pool name
spring.datasource.hikari.pool-name=ctrc-hikari-pool

# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=10

# Minimum number of idle connections
spring.datasource.hikari.minimum-idle=5

# Maximum idle time (in milliseconds) before a connection is closed
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime (in milliseconds) of a connection
spring.datasource.hikari.max-lifetime=1800000

# Connection timeout (in milliseconds)
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA/JDBC CONFIGURATION
# ==========================================

# Show SQL queries in console (for debugging)
spring.jpa.show-sql=false

# Format SQL queries for readability (requires hibernate-jpa)
spring.jpa.properties.hibernate.format_sql=false

# SQL dialect for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# LOGGING CONFIGURATION
# ==========================================

# Root logger level
logging.level.root=INFO

# Application logger level
logging.level.com.cuetproject.ctrcbackend=DEBUG

# Spring Framework logger level
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Database logger level (shows SQL execution)
logging.level.org.springframework.jdbc=DEBUG

# Log file location
logging.file.name=logs/application.log

# ==========================================
# ACTUATOR CONFIGURATION (Optional)
# ==========================================

# Enable all actuator endpoints
management.endpoints.web.exposure.include=*

# Actuator endpoint base path
management.endpoints.web.base-path=/actuator

# ==========================================
# APPLICATION SPECIFIC PROPERTIES
# ==========================================

# Token expiration (in hours)
app.jwt.token-expiration=24

# JWT Secret Key (change this to a strong secret in production!)
app.jwt.secret-key=your-secret-key-change-this-in-production-min-256-bits

# CORS configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8100

# ==========================================
# PROFILE SPECIFIC CONFIGURATIONS
# ==========================================

# Development profile - Spring Boot will automatically
# load this file when the 'dev' profile is active:
# application-dev.properties
# Usage: java -jar app.jar --spring.profiles.active=dev
